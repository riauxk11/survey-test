   ========================= */
let questions=[],current=0,answers=[],wrong=[],startTime;
let currentStudent={};

/* =========================
   四、初始化页面
   ========================= */
window.onload=()=>{
  // 填充学生下拉框
  const sel=document.getElementById("studentSelect");
  students.forEach(s=>{
    const o=document.createElement("option");
    o.value=s.no;
    o.innerText=s.no+" "+s.name;
    sel.appendChild(o);
  });

  // 路由处理
  const params=new URLSearchParams(location.search);
  if(params.get("role")==="teacher"){
    showTeacherPage();
  }else if(params.get("mode")==="wrong"){
    loadWrongQuestions();
  }
};

/* =========================
   五、登录逻辑
   ========================= */
function startLogin(){
  const sel=document.getElementById("studentSelect");
  if(!sel.value){alert("请选择学号");return;}
  currentStudent=students.find(s=>s.no===sel.value);
  startTime=Date.now();
  document.getElementById("loginCard").style.display="none";
  document.getElementById("examCard").style.display="block";
}

/* =========================
   六、考试逻辑
   ========================= */
function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

function startTest(){
  const type=document.getElementById("typeFilter").value;
  let pool=questionBank;
  if(type!=="all") pool=questionBank.filter(q=>q.type===type);
  questions=shuffle([...pool]).slice(0,50);
  answers=[];current=0;
  render();
}

function render(){
  const q=questions[current];
  document.getElementById("progress").innerText=`第 ${current+1} / ${questions.length} 题`;
  document.getElementById("question").innerText=q.text;
  const box=document.getElementById("options");box.innerHTML="";
  q.options.forEach((opt,i)=>{
    const d=document.createElement("div");
    d.className="option";
    d.innerText=opt;
    d.onclick=()=>select(d,i,q.type);
    box.appendChild(d);
  });
}

function select(el,idx,type){
  const opts=document.querySelectorAll("#options .option");
  if(type==="multi"){
    el.classList.toggle("selected");
  }else{
    opts.forEach(o=>o.classList.remove("selected"));
    el.classList.add("selected");
  }
}

function next(){
  const q=questions[current];
  const sel=[...document.querySelectorAll("#options .option.selected")].map(e=>q.options.indexOf(e.innerText));
  if(sel.length===0){alert("请选择答案");return;}
  answers.push({q,sel});
  current++;
  current<questions.length?render():submit();
}

function prev(){
  if(current>0){current--;render();}
}

/* =========================
   七、提交成绩 & 错题保存
   ========================= */
function submit(){
  let score=0;wrong=[];
  answers.forEach(a=>{
    const q=a.q;
    let right=false;
    if(q.type==="multi"){
      right=JSON.stringify(a.sel.sort())===JSON.stringify(q.answer.sort());
    }else{
      right=q.answer===q.options[a.sel[0]];
    }
    if(right)score++;
    else wrong.push(q);
  });

  // 保存错题
  localStorage.setItem("wrong",JSON.stringify(wrong));

  // 保存成绩
  const record={
    no:currentStudent.no,
    name:currentStudent.name,
    score,
    total:questions.length,
    time:Math.round((Date.now()-startTime)/60000),
    date:new Date().toLocaleString()
  };
  let scores=JSON.parse(localStorage.getItem("scores")||"[]");
  scores.push(record);
  localStorage.setItem("scores",JSON.stringify(scores));

  // 显示结果
  document.getElementById("examCard").style.display="none";
  const resultCard=document.getElementById("resultCard");
  resultCard.style.display="block";
  resultCard.innerHTML=`
    <h2>✅ 考试完成</h2>
    <p>学号：${record.no} | 姓名：${record.name}</p>
    <div class="score">${score}/${questions.length}</div>
    <p>得分率：${((score/questions.length)*100).toFixed(1)}%</p>
    <p>用时：${record.time} 分钟</p>
    <p>错题数量：${wrong.length} 题</p>
    <div class="actions">
      <button onclick="location.href='/'">返回首页</button>
      <button onclick="location.href='?mode=wrong'">查看错题</button>
    </div>
  `;
}

/* =========================
   八、错题重练
   ========================= */
function loadWrongQuestions(){
  wrong=JSON.parse(localStorage.getItem("wrong")||"[]");
  if(wrong.length===0){
    alert("暂无错题记录，请先完成考试！");
    location.href="/";
    return;
  }
  questions=wrong;
  answers=[];current=0;
  document.getElementById("loginCard").style.display="none";
  document.getElementById("examCard").style.display="block";
  document.getElementById("typeFilter").disabled=true;
  render();
}

/* =========================
   九、教师端
   ========================= */
function showTeacherPage(){
  document.getElementById("loginCard").style.display="none";
  document.getElementById("examCard").style.display="none";
  document.getElementById("teacherCard").style.display="block";
  loadScores();
}

function loadScores(){
  const scores=JSON.parse(localStorage.getItem("scores")||"[]");
  const container=document.getElementById("scoreTableContainer");
  if(scores.length===0){
    container.innerHTML=`<p style="color:#999;text-align:center;padding:20px;">暂无成绩数据，请等待学生提交考试。</p>`;
    return;
  }
  let html=`<table><tr><th>学号</th><th>姓名</th><th>分数</th><th>总分</th><th>用时（分钟）</th><th>考试时间</th></tr>`;
  scores.forEach(r=>{
    html+=`<tr><td>${r.no}</td><td>${r.name}</td><td>${r.score}</td><td>${r.total}</td><td>${r.time}</td><td>${r.date}</td></tr>`;
  });
  html+=`</table>`;
  container.innerHTML=html;
}

function exportExcel(){
  const scores=JSON.parse(localStorage.getItem("scores")||"[]");
  if(scores.length===0){
    alert("暂无成绩数据，无法导出！");
    return;
  }
  const ws=XLSX.utils.json_to_sheet(scores);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"成绩统计");
  XLSX.writeFile(wb,"测绘成绩.xlsx");
}
</script>
</body>
</html>
